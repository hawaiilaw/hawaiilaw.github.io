<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Ordinance Reader</title>
<link rel="stylesheet" href="coloris.min.css"/>
<link rel="stylesheet" href="lawreader.css"/>

</head>
<body>

<header id="top-bar">
  <img id="top-bar-seal" src="" alt="" style="display:none"/>
  <div id="top-bar-title">Ordinance Reader</div>
  <div id="top-bar-search">
    <input id="finder-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="Quick Finder — section number or title..." aria-label="Quick Finder"/>
    <div id="finder-dropdown"></div>
  </div>
</header>

<div id="layout">

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Chapters &amp; Articles</h2>
    <div id="supplement-line">
      <div id="supplement-badge">Loading...</div>
      <a id="check-live-link" href="#">check current</a>
    </div>
    <div id="sidebar-controls">
      <button id="btn-select-all">All</button>
      <button id="btn-select-none">None</button>
      <button id="btn-favorites" title="Favorites">&#x2605;</button>
    </div>
  </div>

  <div id="favorites-panel">
    <h3>Favorites</h3>
    <ul id="favorites-list"></ul>
  </div>

  <div id="chapter-list">
    <div style="padding:12px;color:#888;font-size:12px;">Loading index...</div>
  </div>

  <div id="new-leg-bar" style="display:none">
    <a href="#" target="_blank">New Legislation</a>
    &mdash; recent changes not yet codified
  </div>

  <div id="load-status">0 sections loaded</div>
  <div id="sidebar-resize"></div>
</div>

<div id="content-area">
  <div class="highlight-panel" id="highlight-panel">
<div class="highlight-panel-tab" onclick="
    var p = document.getElementById('highlight-panel');
    p.classList.toggle('open');
  ">Highlight</div>
<div class="highlight-panel-inner">
<div class="highlight-panel-title-row">
<h3>Text Highlighting</h3>
<label class="hl-toggle-label" title="Enable/disable all highlights">
<input checked="" id="hl-toggle" onchange="toggleHighlightVisibility(this.checked)" type="checkbox"/>
        On
      </label>
</div>
<div class="current-highlight">
<label>Active Highlights</label>
<div id="current-highlighted-text">
<ul id="highlight-list"></ul>
</div>
</div>
<form class="full" onsubmit="return false;">
<label for="texthighlight">Text to Highlight</label>
<input id="texthighlight" onkeydown="if(event.key==='Enter'){applyHighlightAndAdvance();}" type="text"/>
<label for="highlightcolor">Color</label>
<div class="clr-field" style="color: #ffff00;">
<button aria-labelledby="highlightcolor" type="button"></button>
<input data-coloris="" id="highlightcolor" type="text" value="#ffff00"/>
</div>
<button class="apply-highlight-btn" onclick="applyHighlightAndAdvance()" type="button">Apply Highlighting</button>
</form>
</div>
</div>
  <div id="main">
    <div id="main-inner">
      <div id="empty-msg">Check sections on the left to load them.</div>
    </div>
  </div>
</div>

</div><!-- /#layout -->

<div id="nick-modal">
  <h4>Save Favorite</h4>
  <div class="nick-saving" id="nick-saving"></div>
  <button type="button" class="entire" id="nick-entire" style="display:none;"></button>
  <input type="text" id="nick-input" placeholder="Nickname (optional)" autocomplete="off"/>
  <div class="nick-btns">
    <button type="button" id="nick-cancel">Cancel</button>
    <button type="button" class="primary" id="nick-save">Save</button>
  </div>
</div>

<script>window.CHUNKS_DIR='chunks/';</script>
<script src="html2canvas141min.js"></script>
<script src="coloris.min.js"></script>
<script src="docx.umd.js"></script>
<script src="text-highlight.js"></script>
<script src="section-export.js"></script>
<script src="download-section.js"></script>
<script src="reader.js"></script>
<script src="readermain.js"></script>
<script src="sidebar-resize.js"></script>

</body>
</html>
